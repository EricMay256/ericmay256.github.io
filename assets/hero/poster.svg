<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" preserveAspectRatio="xMidYMid slice">
  <!--
    PLACEHOLDER · Hero band still
    Replace with the real Flick Fest still at the same path.
    Will eventually serve double duty as the video poster in Phase 5.
    Aspect ratio 3:1 native; CSS handles 16:9 crop on mobile.
  -->

  <!-- Background fill matches the portfolio bg-card token (#15171a) -->
  <rect width="1500" height="500" fill="#15171a"/>

  <!-- Subtle vignette to give the placeholder some depth -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1c1f23" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0e0f11" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#vignette)"/>

  <!-- Rule of thirds gridlines -->
  <g stroke="#2a2d32" stroke-width="1" fill="none">
    <line x1="500"  y1="0" x2="500"  y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="0" y1="166.67" x2="1500" y2="166.67"/>
    <line x1="0" y1="333.33" x2="1500" y2="333.33"/>
  </g>

  <!-- Center crosshair -->
  <g stroke="#3d4147" stroke-width="1" fill="none">
    <line x1="730" y1="250" x2="770" y2="250"/>
    <line x1="750" y1="230" x2="750" y2="270"/>
    <circle cx="750" cy="250" r="4"/>
  </g>

  <!-- Frame corners: small L brackets to read as "framing target" -->
  <g stroke="#3d4147" stroke-width="2" fill="none">
    <!-- top left -->
    <polyline points="40,80 40,40 80,40"/>
    <!-- top right -->
    <polyline points="1420,40 1460,40 1460,80"/>
    <!-- bottom left -->
    <polyline points="40,420 40,460 80,460"/>
    <!-- bottom right -->
    <polyline points="1420,460 1460,460 1460,420"/>
  </g>

  <!-- Placeholder label: top left, mono, dim -->
  <text x="60" y="32" font-family="DM Mono, monospace" font-size="14"
        fill="#636a75" letter-spacing="0.06em">// PLACEHOLDER · HERO · 3:1</text>

  <!-- Center caption: dim, identifies what goes here -->
  <g font-family="DM Mono, monospace" fill="#636a75" text-anchor="middle">
    <text x="750" y="390" font-size="18" letter-spacing="0.1em">flick fest still</text>
    <text x="750" y="415" font-size="11" letter-spacing="0.06em" fill="#3d4147">
      end of video held frame · also serves as video poster
    </text>
  </g>
</svg>
