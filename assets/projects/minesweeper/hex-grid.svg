<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" preserveAspectRatio="xMidYMid slice">
  <!--
    PLACEHOLDER — Minesweeper hex grid
    Replace with real PNG/JPG screenshot at the same path.
    Target ratio ~ 4:3, will be cropped via object-fit: cover.
  -->
  <defs>
    <!-- A single hex centered at (10, 10) with circumradius ~10. Pointy-top. -->
    <symbol id="hex" viewBox="-12 -12 24 24" overflow="visible">
      <polygon points="0,-10 8.66,-5 8.66,5 0,10 -8.66,5 -8.66,-5"
               fill="#2a2d32" stroke="#15171a" stroke-width="1"/>
    </symbol>
  </defs>

  <rect width="200" height="150" fill="#1c1f23"/>

  <!-- Hex grid: pointy-top, columns offset by half a hex height -->
  <!-- Column step: 8.66 * sqrt(3) ≈ 15; Row step: 15 (height) -->
  <!-- Approx. 11 columns × 9 rows -->
  <g>
    <!-- Row 0 -->
    <use href="#hex" x="10" y="10"/><use href="#hex" x="28" y="10"/><use href="#hex" x="46" y="10"/>
    <use href="#hex" x="64" y="10"/><use href="#hex" x="82" y="10"/><use href="#hex" x="100" y="10"/>
    <use href="#hex" x="118" y="10"/><use href="#hex" x="136" y="10"/><use href="#hex" x="154" y="10"/>
    <use href="#hex" x="172" y="10"/><use href="#hex" x="190" y="10"/>
    <!-- Row 1 (offset) -->
    <use href="#hex" x="19" y="25"/><use href="#hex" x="37" y="25"/><use href="#hex" x="55" y="25"/>
    <use href="#hex" x="73" y="25"/><use href="#hex" x="91" y="25"/><use href="#hex" x="109" y="25"/>
